<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Canvas 视频截图</title>
</head>

<body>
  <!--
  不同域会报错：
  Uncaught DOMException: Failed to execute 'toDataURL' on 'HTMLCanvasElement': Tainted canvases may not be exported.
  网上提供的以下方法，试了无效(猜测需要服务器做允许跨域请求的处理)
  img.setAttribute("crossOrigin", 'anonymous');
  -->
  <p>下面是一段同域名视频：</p>
  <video id="video1" controls="controls" src="../1.mp4"></video>
  <div>
    <button onclick="capture1()">本地视频截图</button>
  </div>
  <h5>截图展示: </h5>
  <div id="output1"></div>

  <p>下面是一段不同域名视频：</p>
  <video id="video2" controls="controls" src="https://chimee.org/vod/1.mp4"></video>
  <div>
    <button onclick="capture2()">网络视频截图</button>
    <button onclick="changeBlob()">视频转成blob</button>
  </div>
  <h5>截图展示: </h5>
  <div id="output2"></div>

  <script>
    var captureImage = function (video, outputElem) {
      var scale = 0.5;
      var img = document.createElement("img");
      var canvas = document.createElement("canvas");
      canvas.width = video.videoWidth * scale;
      canvas.height = video.videoHeight * scale;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      img.src = canvas.toDataURL();
      outputElem.prepend(img);
    };
    var capture1 = function () {
      var video1 = document.getElementById("video1");
      var outputElem1 = document.getElementById("output1");
      captureImage(video1, outputElem1);
    }
    var capture2 = function () {
      var video2 = document.getElementById("video2");
      var outputElem2 = document.getElementById("output2");
      captureImage(video2, outputElem2);
    }

    var changeBlob = function () {
      ajax('https://chimee.org/vod/1.mp4', function (res) {
        const src = URL.createObjectURL(res);
        video2.src = src;
      })
    }

    function ajax(url, cb) {
      const xhr = new XMLHttpRequest();
      xhr.open("get", url);
      xhr.responseType = "blob"; // "text"-字符串 "blob"-Blob对象 "arraybuffer"-ArrayBuffer对象
      xhr.onload = function () {
        cb(xhr.response);
      };
      xhr.send();
    }
  </script>
</body>

</html>
