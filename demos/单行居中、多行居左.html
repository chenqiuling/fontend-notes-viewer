<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>单行居中，多行居左</title>
  <style>
    div {
      width: 180px;
      border: 1px solid #000;
      text-align: center;
    }

    p {
      display: inline-block;
      text-align: left;
    }
  </style>
</head>

<body>
  <div>
    <p>这是单行文字</p>
    <p>这是多行文字，这是多行文字</p>
  </div>
</body>

</html>
