<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>input file 图片预览（base64）</title>
</head>

<body>
  <input type="file" onchange="getFile(this)" />
  <img id="preview" alt="预览图片" src="" onerror="this.style.display = 'none'"
    style="max-width: 200px; margin-top: 20px;" />
  <h5>生成的base64：</h5>
  <p id="base64" style="word-break: break-all;"></p>
  <script>
    function getFile(source) {
      var oBase64 = document.getElementById("base64");
      var oPreview = document.getElementById("preview");
      if (window.FileReader) {
        var oFileReader = new FileReader(),
          oFile = source.files[0];
        // 过滤非图片文件
        if (/^image*/.test(oFile.type)) {
          oFileReader.onloadend = function (e) {
            oBase64.innerHTML = e.target.result;
            oPreview.src = e.target.result;
            oPreview.style.display = 'block';
          };
          // 将图片转为base64格式
          oFileReader.readAsDataURL(oFile);
        }
        oBase64.innerHTML = "请选择图片文件!";
        oPreview.src = "";
      } else {
        oBase64.innerHTML = "您当前使用的浏览器不支持读取文件功能";
      }
    }
  </script>
</body>

</html>
