<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日期转中文</title>
</head>

<body>
  <script>
    function changeDateToText(dateNumber) {
      var dateString = "一二三四五六七八九十";
      var result = "";
      if (dateNumber == 0) {
        result = "十";
      } else if (dateNumber < 10) {
        result = dateString.substring(0 + (dateNumber - 1), dateNumber);
      } else if (dateNumber < 20) {
        result = "十" + dateString.substring(0 + (dateNumber - 11), (dateNumber - 10));
      } else if (dateNumber < 30) {
        result = "二十" + dateString.substring(0 + (dateNumber - 21), (dateNumber - 20));
      } else {
        result = "三十" + dateString.substring(0 + (dateNumber - 31), (dateNumber - 30));
      }
      return result;
    }

    // 获取当前日期
    var today = new Date();
    var month = today.getMonth() + 1;
    var date = today.getDate();
    var week = ' 星期' + '日一二三四五六'.charAt(today.getDay());
    document.write("今天是" + changeDateToText(month) + "月" + changeDateToText(date) + "日" + week);
  </script>
</body>

</html>
